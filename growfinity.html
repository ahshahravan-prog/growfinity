<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growfinity — مشاور هوشمند رشد کسب‌وکار</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1A9B6C;
  --green-light: #22C88A;
  --green-pale: #E8F7F2;
  --green-dim: rgba(26,155,108,0.1);
  --blue: #2563EB;
  --blue-light: #3B82F6;
  --blue-pale: #EFF6FF;
  --blue-dim: rgba(37,99,235,0.08);
  --white: #FFFFFF;
  --off-white: #F8FAFB;
  --surface: #FFFFFF;
  --border: #E8EDF2;
  --border2: #D1DBE8;
  --text: #0F1F2E;
  --text2: #4A6274;
  --text3: #8DA3B4;
  --success: #1A9B6C;
  --warn: #F59E0B;
  --danger: #EF4444;
  --shadow-sm: 0 1px 3px rgba(15,31,46,0.06), 0 1px 2px rgba(15,31,46,0.04);
  --shadow: 0 4px 16px rgba(15,31,46,0.08), 0 2px 6px rgba(15,31,46,0.04);
  --shadow-lg: 0 16px 48px rgba(15,31,46,0.12);
  --radius: 14px;
  --radius-sm: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family: 'Vazirmatn', sans-serif;
  background: var(--off-white);
  color: var(--text);
  min-height: 100dvh;
}

/* ── SPLASH ── */
#splash {
  position:fixed; inset:0;
  background: linear-gradient(135deg, #0F2A1E 0%, #0A1628 100%);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:9999;
  transition: opacity 0.8s ease, visibility 0.8s;
}
#splash.out { opacity:0; visibility:hidden; pointer-events:none; }
.sp-logo-wrap { display:flex; align-items:center; gap:14px; animation: fadeUp 1s ease both; }
.sp-icon {
  width:52px; height:52px; border-radius:16px;
  background: linear-gradient(135deg, var(--green), var(--blue));
  display:flex; align-items:center; justify-content:center;
  font-size:1.6rem;
}
.sp-name {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(2rem,7vw,3.5rem);
  color: #fff; letter-spacing:1px;
}
.sp-name span { color: var(--green-light); }
.sp-tagline {
  margin-top:16px; color:rgba(255,255,255,0.45);
  font-size:0.85rem; letter-spacing:3px; text-transform:uppercase;
  animation: fadeUp 1s 0.3s ease both;
}
.sp-bar {
  margin-top:40px; width:180px; height:2px;
  background:rgba(255,255,255,0.1); border-radius:2px;
  overflow:hidden; animation: fadeUp 1s 0.5s ease both;
}
.sp-bar-fill {
  height:100%; width:0%;
  background: linear-gradient(90deg, var(--green-light), var(--blue-light));
  animation: loadBar 2s 0.5s ease both;
}
@keyframes loadBar { to{width:100%} }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

/* ── AUTH SCREEN ── */
#authScreen {
  display:none; min-height:100dvh;
  background: linear-gradient(135deg, #F0FDF8 0%, #EFF6FF 100%);
  align-items:center; justify-content:center;
  padding:20px;
}
#authScreen.show { display:flex; }
.auth-card {
  background:var(--white); border-radius:24px;
  box-shadow:var(--shadow-lg);
  padding:40px 36px; width:100%; max-width:420px;
  animation: scaleIn 0.5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes scaleIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:none} }
.auth-logo { display:flex; align-items:center; gap:10px; margin-bottom:28px; }
.auth-icon {
  width:40px; height:40px; border-radius:12px;
  background:linear-gradient(135deg,var(--green),var(--blue));
  display:flex; align-items:center; justify-content:center; font-size:1.2rem;
}
.auth-brand {
  font-family:'DM Serif Display',serif; font-size:1.4rem; color:var(--text);
}
.auth-brand span { color:var(--green); }
.auth-title { font-size:1.4rem; font-weight:700; color:var(--text); margin-bottom:6px; }
.auth-sub { font-size:0.85rem; color:var(--text2); margin-bottom:28px; line-height:1.6; }
.auth-tabs { display:flex; background:var(--off-white); border-radius:10px; padding:4px; margin-bottom:24px; }
.auth-tab {
  flex:1; padding:8px; border-radius:8px; border:none;
  background:transparent; font-family:'Vazirmatn',sans-serif;
  font-size:0.85rem; color:var(--text2); cursor:pointer; transition:all 0.2s;
}
.auth-tab.on { background:var(--white); color:var(--text); font-weight:600; box-shadow:var(--shadow-sm); }
.field { margin-bottom:16px; }
.field label { display:block; font-size:0.8rem; font-weight:600; color:var(--text2); margin-bottom:6px; }
.field input {
  width:100%; padding:12px 14px; border-radius:10px;
  border:1.5px solid var(--border); background:var(--white);
  font-family:'Vazirmatn',sans-serif; font-size:0.9rem; color:var(--text);
  outline:none; transition:border-color 0.2s, box-shadow 0.2s;
}
.field input:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(26,155,108,0.1); }
.btn-auth {
  width:100%; padding:13px; border-radius:10px;
  background:linear-gradient(135deg, var(--green), #16865C);
  border:none; color:#fff; font-family:'Vazirmatn',sans-serif;
  font-size:0.92rem; font-weight:700; cursor:pointer;
  transition:all 0.2s; margin-top:4px;
}
.btn-auth:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(26,155,108,0.3); }
.auth-divider { text-align:center; color:var(--text3); font-size:0.78rem; margin:16px 0; }
.btn-google {
  width:100%; padding:12px; border-radius:10px;
  border:1.5px solid var(--border); background:var(--white);
  font-family:'Vazirmatn',sans-serif; font-size:0.88rem;
  color:var(--text); cursor:pointer; transition:all 0.2s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-google:hover { border-color:var(--border2); background:var(--off-white); }

/* ── MAIN APP ── */
#mainApp { display:none; min-height:100dvh; }
#mainApp.show { display:block; }

/* ── TOPBAR ── */
.topbar {
  position:sticky; top:0; z-index:100;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 20px;
  display:flex; align-items:center; justify-content:space-between;
  height:60px;
}
.tb-logo { display:flex; align-items:center; gap:8px; }
.tb-icon {
  width:32px; height:32px; border-radius:9px;
  background:linear-gradient(135deg,var(--green),var(--blue));
  display:flex; align-items:center; justify-content:center; font-size:1rem;
}
.tb-name { font-family:'DM Serif Display',serif; font-size:1.1rem; color:var(--text); }
.tb-name span { color:var(--green); }
.tb-right { display:flex; align-items:center; gap:10px; }
.tb-nav { display:flex; gap:4px; }
.tb-navbtn {
  padding:6px 14px; border-radius:20px; border:none;
  background:transparent; font-family:'Vazirmatn',sans-serif;
  font-size:0.8rem; color:var(--text2); cursor:pointer; transition:all 0.2s;
}
.tb-navbtn.on { background:var(--green-dim); color:var(--green); font-weight:600; }
.tb-navbtn:hover:not(.on) { background:var(--off-white); }
.tb-avatar {
  width:32px; height:32px; border-radius:50%;
  background:linear-gradient(135deg,var(--green),var(--blue));
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:0.8rem; font-weight:700; cursor:pointer;
}
.save-indicator {
  display:flex; align-items:center; gap:5px;
  font-size:0.72rem; color:var(--green); opacity:0;
  transition:opacity 0.3s;
}
.save-indicator.show { opacity:1; }
.save-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── VIEWS ── */
.view { display:none; }
.view.active { display:block; }

/* ── ADVISOR VIEW ── */
#advisorView {
  display:none;
  height:calc(100dvh - 60px);
  flex-direction:column;
}
#advisorView.active { display:flex; }

/* Step pills */
.steps-strip {
  padding:10px 16px; display:flex; gap:6px;
  overflow-x:auto; scrollbar-width:none;
  border-bottom:1px solid var(--border);
  background:var(--white); flex-shrink:0;
}
.steps-strip::-webkit-scrollbar { display:none; }
.step-chip {
  flex-shrink:0; padding:5px 13px; border-radius:20px;
  border:1.5px solid var(--border); color:var(--text3);
  font-size:0.72rem; white-space:nowrap;
  display:flex; align-items:center; gap:5px;
  transition:all 0.3s;
}
.step-chip.active { border-color:var(--green); color:var(--green); background:var(--green-dim); font-weight:600; }
.step-chip.done { border-color:var(--green); color:var(--green); background:var(--green-dim); }
.step-chip.done::before { content:'✓ '; }
.prog-strip { height:3px; background:var(--border); flex-shrink:0; }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--green),var(--blue-light)); transition:width 0.6s ease; }

/* Chat */
#chatBox {
  flex:1; overflow-y:auto; padding:20px 16px;
  display:flex; flex-direction:column; gap:14px;
}
#chatBox::-webkit-scrollbar { width:4px; }
#chatBox::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.msg { display:flex; gap:10px; animation:msgIn 0.35s cubic-bezier(.16,1,.3,1) both; }
@keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
.msg.user { flex-direction:row-reverse; }
.msg-av {
  width:32px; height:32px; border-radius:10px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:0.9rem;
}
.ai-av { background:linear-gradient(135deg,var(--green),var(--blue)); color:#fff; }
.user-av { background:var(--off-white); border:1.5px solid var(--border); font-size:0.78rem; color:var(--text2); }
.bubble {
  max-width:min(82%,560px); padding:13px 16px;
  border-radius:16px; font-size:0.875rem; line-height:1.8;
}
.ai .bubble {
  background:var(--white); border:1.5px solid var(--border);
  color:var(--text); border-top-right-radius:4px;
  box-shadow:var(--shadow-sm);
}
html[dir=ltr] .ai .bubble { border-top-right-radius:16px; border-top-left-radius:4px; }
.user .bubble {
  background:linear-gradient(135deg,var(--green),#16865C);
  color:#fff; border-top-left-radius:4px;
}
html[dir=ltr] .user .bubble { border-top-left-radius:16px; border-top-right-radius:4px; }
.bubble strong { color:var(--green); font-weight:700; }
.user .bubble strong { color:#fff; }

/* typing */
.typing-wrap { display:flex; gap:4px; padding:3px 0; }
.typing-wrap span {
  width:7px; height:7px; border-radius:50%;
  background:var(--green); opacity:.35;
  animation:td 1.4s infinite;
}
.typing-wrap span:nth-child(2){animation-delay:.2s}
.typing-wrap span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{opacity:.35;transform:none}40%{opacity:1;transform:translateY(-5px)}}

/* quick replies */
.qr-wrap {
  display:flex; flex-wrap:wrap; gap:8px;
  padding:2px 0 0 42px; animation:msgIn 0.3s 0.1s ease both;
}
html[dir=ltr] .qr-wrap { padding:2px 0 0 42px; }
.qr {
  padding:7px 15px; border-radius:20px;
  border:1.5px solid var(--green); color:var(--green);
  background:var(--green-dim); cursor:pointer;
  font-family:'Vazirmatn',sans-serif; font-size:0.78rem;
  font-weight:600; transition:all 0.2s;
}
.qr:hover { background:var(--green); color:#fff; }

/* step divider */
.chat-divider {
  display:flex; align-items:center; gap:10px;
  font-size:0.7rem; color:var(--green); font-weight:700;
  letter-spacing:1.5px; text-transform:uppercase; padding:4px 0;
}
.chat-divider::before,.chat-divider::after {
  content:''; flex:1; height:1px; background:var(--green-dim);
}

/* input */
.chat-input-wrap {
  padding:12px 16px 16px; border-top:1px solid var(--border);
  background:var(--white); flex-shrink:0;
}
.chat-input-inner {
  display:flex; gap:10px; align-items:flex-end;
  background:var(--off-white); border:1.5px solid var(--border);
  border-radius:14px; padding:10px 12px; transition:border-color 0.2s;
}
.chat-input-inner:focus-within { border-color:var(--green); box-shadow:0 0 0 3px rgba(26,155,108,0.08); }
#msgInput {
  flex:1; background:transparent; border:none; outline:none;
  font-family:'Vazirmatn',sans-serif; font-size:0.875rem;
  color:var(--text); resize:none; max-height:100px; min-height:22px; line-height:1.6;
}
#msgInput::placeholder { color:var(--text3); }
#sendBtn {
  width:36px; height:36px; border-radius:10px; flex-shrink:0;
  background:var(--green); border:none; color:#fff;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:1rem; transition:all 0.2s;
}
#sendBtn:hover { background:var(--green-light); transform:scale(1.05); }
#sendBtn:disabled { opacity:.4; cursor:default; transform:none; }

/* ── PLAN VIEW ── */
#planView { display:none; padding:24px 16px 80px; max-width:800px; margin:0 auto; }
#planView.active { display:block; }
.plan-header {
  background:linear-gradient(135deg,var(--green),var(--blue));
  border-radius:20px; padding:28px; margin-bottom:20px; color:#fff;
  position:relative; overflow:hidden;
}
.plan-header::before {
  content:''; position:absolute; top:-40px; right:-40px;
  width:160px; height:160px; border-radius:50%;
  background:rgba(255,255,255,0.08);
}
.plan-header-tag { font-size:0.72rem; letter-spacing:2px; text-transform:uppercase; opacity:.7; margin-bottom:8px; }
.plan-header-title { font-family:'DM Serif Display',serif; font-size:1.8rem; margin-bottom:6px; }
.plan-header-sub { font-size:0.85rem; opacity:.8; }
.plan-section { margin-bottom:20px; }
.plan-section-title {
  font-size:0.8rem; font-weight:700; color:var(--text2);
  letter-spacing:1.5px; text-transform:uppercase;
  margin-bottom:12px; display:flex; align-items:center; gap:8px;
}
.plan-section-title::after { content:''; flex:1; height:1px; background:var(--border); }
.plan-card {
  background:var(--white); border-radius:var(--radius);
  border:1.5px solid var(--border); overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.plan-week-head {
  padding:12px 18px; border-bottom:1px solid var(--border);
  font-size:0.82rem; font-weight:700; color:var(--green);
  background:var(--green-dim);
  display:flex; align-items:center; gap:8px;
}
.plan-task {
  padding:11px 18px; border-bottom:1px solid var(--off-white);
  display:flex; align-items:flex-start; gap:10px;
  font-size:0.83rem; color:var(--text); line-height:1.5;
}
.plan-task:last-child { border-bottom:none; }
.pt-dot { width:5px; height:5px; border-radius:50%; background:var(--green); margin-top:6px; flex-shrink:0; }
.pt-tag {
  font-size:0.62rem; padding:2px 8px; border-radius:8px;
  font-weight:700; flex-shrink:0; margin-top:2px;
}
.t-m{background:#EFF6FF;color:var(--blue)}
.t-s{background:#F0FDF4;color:var(--green)}
.t-l{background:#FFF7ED;color:#C2410C}
.t-a{background:#F5F3FF;color:#7C3AED}

/* summary cards */
.summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.summary-item {
  background:var(--white); border:1.5px solid var(--border);
  border-radius:var(--radius); padding:14px 16px;
  box-shadow:var(--shadow-sm);
}
.summary-label { font-size:0.72rem; color:var(--text3); font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
.summary-val { font-size:0.88rem; color:var(--text); font-weight:600; line-height:1.5; }
.summary-val.green { color:var(--green); }

.dl-btn {
  width:100%; padding:14px; border-radius:var(--radius);
  background:linear-gradient(135deg,var(--green),#16865C);
  border:none; color:#fff; font-family:'Vazirmatn',sans-serif;
  font-size:0.92rem; font-weight:700; cursor:pointer; transition:all 0.2s;
  display:flex; align-items:center; justify-content:center; gap:8px; margin-top:16px;
}
.dl-btn:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(26,155,108,.3); }

/* ── DASHBOARD VIEW ── */
#dashView { display:none; padding:24px 16px 80px; max-width:800px; margin:0 auto; }
#dashView.active { display:block; }
.dash-greeting { margin-bottom:20px; }
.dash-greeting h2 { font-family:'DM Serif Display',serif; font-size:1.6rem; color:var(--text); }
.dash-greeting p { font-size:0.85rem; color:var(--text2); margin-top:4px; }
.kpi-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:20px; }
.kpi-card {
  background:var(--white); border:1.5px solid var(--border);
  border-radius:var(--radius); padding:16px;
  box-shadow:var(--shadow-sm); position:relative; overflow:hidden;
}
.kpi-card::before {
  content:''; position:absolute; bottom:-20px; left:-20px;
  width:80px; height:80px; border-radius:50%;
  opacity:.06;
}
.kpi-card.green::before { background:var(--green); }
.kpi-card.blue::before { background:var(--blue); }
.kpi-icon { font-size:1.3rem; margin-bottom:8px; }
.kpi-label { font-size:0.7rem; color:var(--text3); font-weight:600; letter-spacing:1px; text-transform:uppercase; }
.kpi-val { font-size:1.5rem; font-weight:800; color:var(--text); margin:4px 0 2px; }
.kpi-change {
  font-size:0.72rem; font-weight:700;
  display:inline-flex; align-items:center; gap:3px;
}
.kpi-change.up { color:var(--green); }
.kpi-change.down { color:var(--danger); }

.dash-section { margin-bottom:20px; }
.dash-section-title {
  font-size:0.8rem; font-weight:700; color:var(--text2);
  letter-spacing:1.5px; text-transform:uppercase;
  margin-bottom:12px; display:flex; align-items:center; gap:8px;
}
.dash-section-title::after { content:''; flex:1; height:1px; background:var(--border); }

/* Progress bars */
.goal-card {
  background:var(--white); border:1.5px solid var(--border);
  border-radius:var(--radius); padding:16px; margin-bottom:10px;
  box-shadow:var(--shadow-sm);
}
.goal-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.goal-name { font-size:0.85rem; font-weight:600; color:var(--text); }
.goal-pct { font-size:0.8rem; font-weight:700; color:var(--green); }
.goal-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.goal-bar-fill { height:100%; background:linear-gradient(90deg,var(--green),var(--blue-light)); border-radius:3px; transition:width 1s ease; }
.goal-sub { font-size:0.72rem; color:var(--text3); margin-top:6px; }

/* Activity feed */
.activity-item {
  display:flex; gap:12px; padding:12px 0;
  border-bottom:1px solid var(--off-white);
  align-items:flex-start;
}
.activity-item:last-child { border-bottom:none; }
.ac-icon {
  width:32px; height:32px; border-radius:9px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:0.9rem;
}
.ac-green { background:var(--green-dim); }
.ac-blue { background:var(--blue-dim); }
.ac-body { flex:1; }
.ac-title { font-size:0.83rem; font-weight:600; color:var(--text); }
.ac-time { font-size:0.72rem; color:var(--text3); margin-top:2px; }

/* monthly check-in */
.checkin-card {
  background:linear-gradient(135deg,var(--green-pale),var(--blue-pale));
  border:1.5px solid var(--border); border-radius:var(--radius);
  padding:20px; display:flex; gap:16px; align-items:center;
}
.ci-icon {
  width:48px; height:48px; border-radius:14px; flex-shrink:0;
  background:linear-gradient(135deg,var(--green),var(--blue));
  display:flex; align-items:center; justify-content:center; font-size:1.4rem;
}
.ci-body { flex:1; }
.ci-title { font-size:0.95rem; font-weight:700; color:var(--text); margin-bottom:4px; }
.ci-sub { font-size:0.8rem; color:var(--text2); line-height:1.5; }
.ci-btn {
  padding:9px 18px; border-radius:20px;
  background:var(--green); border:none; color:#fff;
  font-family:'Vazirmatn',sans-serif; font-size:0.8rem;
  font-weight:700; cursor:pointer; transition:all 0.2s; flex-shrink:0;
}
.ci-btn:hover { background:var(--green-light); }

/* plan empty state */
.empty-state {
  text-align:center; padding:60px 20px;
}
.empty-icon { font-size:3rem; margin-bottom:16px; }
.empty-title { font-size:1.1rem; font-weight:700; color:var(--text); margin-bottom:8px; }
.empty-sub { font-size:0.85rem; color:var(--text2); line-height:1.6; margin-bottom:20px; }

  transition:transform 0.3s ease; white-space:nowrap;
  box-shadow:var(--shadow-lg);

</head>
<body>

<script>
// ════════════════════════════════════
//  STATE
// ════════════════════════════════════
let lang = 'fa';
let currentView = 'advisor';
let currentStep = 0;
let isBusy = false;
let history = [];
let userData = { name:'', email:'' };
let planData = null;
let savedData = {};
let authMode = 'signup';

const STEP_LABELS = {
  fa: ['تحلیل محیط','استراتژی','جذب مشتری','وفادارسازی','آنالیز'],
  en: ['Analysis','Strategy','Acquisition','Loyalty','Analytics']
};

// ════════════════════════════════════
//  SYSTEM PROMPT
// ════════════════════════════════════
const SYS = `You are Growfinity's expert AI business growth advisor, built on the proprietary "Billion Print" methodology — a 5-step marketing plan framework created to help entrepreneurs build and grow successful businesses. You act like a warm, patient, and highly knowledgeable business consultant sitting next to the user.

CRITICAL LANGUAGE RULE: Always respond in the SAME language the user writes in — Persian (Farsi) or English. Match their language naturally and completely.

YOUR CORE MISSION:
Most of your users are NOT marketing experts. Many don't know what SWOT, USP, KPI, or "target market" even mean. Your job is to be their teacher AND their consultant at the same time:
- NEVER assume the user knows a concept. Always EXPLAIN it first in plain, simple language with a real-world example.
- Then GUIDE them to answer for their own business — don't just ask an empty question and leave them confused.
- If they seem stuck or give a vague answer, HELP them by offering examples or asking simpler sub-questions.
- If they don't know an answer, suggest a reasonable draft based on what you already know about their business, and let them confirm or adjust.
- Your goal: by the end, even a complete beginner walks away with a professional, complete marketing plan they actually understand.

TEACHING STYLE (very important) — for EACH concept follow this pattern:
1. EXPLAIN simply (1-2 sentences + relatable analogy)
2. GIVE AN EXAMPLE from a business similar to theirs
3. ASK ONE simple question — never overwhelm with multiple questions at once
4. ACKNOWLEDGE their answer warmly, then help refine it if needed
5. When a step is complete, SUMMARIZE what you built together and CONFIRM before moving on
Keep each message SHORT — 3 to 4 short paragraphs max. Use emojis sparingly. Make the user feel capable and smart.

THE 5 STEPS OF BILLION PRINT:

STEP 1 — تحلیل فضای کسب‌وکار (Business Environment Analysis). Guide in THIS ORDER (market → customer → competitors → conclusion):
1. شرح کار (Business Description)
2. اندازه بازار (Market Size: small/medium/large)
3. روند بازار (Market Trend: growing/stable/declining)
4. بازار هدف (Target Market: B2C/B2B/both — explain the difference simply)
5. نیاز مشتری (Customer Need)
6. تحلیل رقبا (Competitor Analysis)
7. تحلیل SWOT — ask ONE at a time: نقاط قوت → نقاط ضعف → فرصت‌ها → تهدیدها
8. مزیت رقابتی USP — the CONCLUSION; help them derive it from everything above
End with summary + confirm, then [STEP_COMPLETE:1]

STEP 2 — استراتژی‌ها و اهداف (Strategy & Goals):
1. چشم‌انداز (Vision — the 5-year dream)
2. ماموریت (Mission — why the business exists)
3. استراتژی رقابتی: رهبری هزینه (Cost Leadership) / تمایز (Differentiation) / تمرکز بر بازار خاص (Niche Focus)
4. استراتژی توسعه: توسعه محصول / توسعه بازار / نفوذ در بازار / تنوع‌بخشی
5. اهداف — help set 3 realistic specific goals (don't do KPIs yet)
End with summary + confirm, then [STEP_COMPLETE:2]

STEP 3 — روش‌های جذب مشتری (Customer Acquisition). Enhanced Bullseye Framework, 15 channels.
First explain what marketing channels are. Then based on EVERYTHING from Steps 1-2 (B2B/B2C, strategy, market), INTELLIGENTLY RECOMMEND the best 4-5 channels for THEM and explain WHY each fits. Let user confirm/add/remove. Then ask monthly budget.
THE 15 CHANNELS:
1. روابط عمومی PR (includes Guerrilla Marketing — stunts for media coverage)
2. تبلیغات سرچ SEM (Google Ads)
3. تبلیغات آفلاین (billboard, radio, print)
4. سئو SEO (organic ranking)
5. بازاریابی محتوا (blog, podcast, video)
6. ایمیل مارکتینگ
7. وایرال مارکتینگ (includes Guerrilla Marketing — stunts to be shared)
8. ابزارهای رایگان (Engineering as Marketing)
9. توسعه کسب‌وکار (partnerships)
10. فروش مستقیم (Direct Sales)
11. افیلیت مارکتینگ
12. شبکه‌های اجتماعی، پیامرسان‌ها و اینفلوئنسر (Instagram, Telegram, WhatsApp, TikTok, influencers)
13. رویدادها (trade shows, workshops, speaking)
14. کامیونیتی بیلدینگ (brand community)
15. AI Marketing (AI personalization)
NOTE: Guerrilla Marketing is a technique, not a standalone channel — it lives under PR (for media coverage) or Viral (for sharing). Recommend the right approach based on user's goal.
End with summary of channels + budget + confirm, then [STEP_COMPLETE:3]

STEP 4 — وفادارسازی مشتریان (Customer Loyalty). Core = loyalty club (باشگاه مشتریان).
First explain: acquiring a new customer costs 5x more than keeping one. Then:
1. سیستم سطح‌بندی (Tier system — like Bronze/Silver/Gold; ask how many tiers)
2. تکنیک‌های نگهداشت: تخفیف دوره‌ای / امتیازدهی / هدیه تولد / پیشنهاد بازگشت در تاریخ مشخص / محصول رایگان / نوتیفیکیشن هوشمند (all built around the loyalty club)
3. هدف نرخ بازگشت مشتری (target return rate %)
End with summary + confirm, then [STEP_COMPLETE:4]

STEP 5 — آنالیز و بهبود مستمر (Analytics & Continuous Improvement).
First explain KPIs simply (like a car dashboard telling you if the business is doing well). Then:
1. تعریف KPI ها — based on Step 2 goals, help pick right KPIs (revenue, new customers, return rate, CAC, NPS, traffic)
2. Core Metrics — the 2-3 most important numbers
3. دوره بررسی (weekly/bi-weekly/monthly)
4. Explain the improvement loop: if Step 3 channels aren't hitting Step 2 goals, adjust.
THEN THE GRAND FINALE: generate a complete personalized 1-MONTH ACTION PLAN tying together goals (Step 2) + channels (Step 3) + loyalty actions (Step 4) + KPIs (Step 5). The plan is the bridge between knowledge and action.

OUTPUT SIGNALS (keep EXACT):
- When a step is fully complete, END your message with exactly [STEP_COMPLETE:X] (X = 1 to 5)
- When generating the final plan in Step 5, wrap it in [PLAN]...[/PLAN]

ACTION PLAN FORMAT (inside [PLAN][/PLAN]):
[WEEK1]
- Task | tag:marketing
- Task | tag:sales
[WEEK2]
- Task | tag:loyalty
- Task | tag:analytics
[WEEK3]
- Task | tag:marketing
[WEEK4]
- Task | tag:analytics
[/PLAN]
Tags allowed: marketing, sales, loyalty, analytics only. Make tasks SPECIFIC to their business. Week1=Foundation, Week2=Execution, Week3=Optimization, Week4=Analysis & Growth.

Also include a summary block wrapped in [SUMMARY]...[/SUMMARY] with JSON:
{
  "businessDesc": "short description",
  "targetMarket": "B2C/B2B/Both",
  "strategy": "chosen competitive strategy",
  "topChannels": ["channel1","channel2","channel3"],
  "mainGoals": ["goal1","goal2","goal3"],
  "loyaltySystem": "short description",
  "kpis": ["kpi1","kpi2","kpi3"]
}

GOLDEN RULES (never break):
1. Never skip a step or jump ahead — follow the order.
2. Never assume knowledge — always teach first.
3. One question at a time.
4. Always help a stuck user with examples or a suggested draft.
5. Stay warm and encouraging — make the user feel capable.
6. Keep messages short and digestible.
7. Everything personalized to THEIR business — never generic.
8. The final action plan must weave together all 5 steps.`;

// ════════════════════════════════════
//  INIT
// ════════════════════════════════════
window.onload = () => {
  setTimeout(() => {
    document.getElementById('splash').classList.add('out');
    setTimeout(() => {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('authScreen').classList.add('show');
    }, 800);
  }, 2400);
};

// ════════════════════════════════════
//  LANG
// ════════════════════════════════════
function setLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.documentElement.dir = l === 'fa' ? 'rtl' : 'ltr';
  document.querySelectorAll('.ltb').forEach(b => b.classList.remove('on'));
  document.querySelectorAll(`.ltb[onclick="setLang('${l}')"]`).forEach(b => b.classList.add('on'));

  const t = {
    fa: {
      spTagline:'مشاور هوشمند رشد کسب‌وکار',
      authTitle:'خوش آمدید', authSub:'با ثبت‌نام، به مشاور هوشمند رشد کسب‌وکار دسترسی پیدا کنید',
      tabSignup:'ثبت‌نام', tabLogin:'ورود',
      nameLabel:'نام و نام خانوادگی', emailLabel:'ایمیل', passLabel:'رمز عبور',
      authBtn: authMode==='signup' ? 'ثبت‌نام رایگان':'ورود',
      googleBtnText:'ادامه با Google', authDivider:'یا',
      navAdvisorLabel:'مشاور', navPlanLabel:'پلن', navDashLabel:'داشبورد',
      saveText:'ذخیره شد', placeholder:'پیام خود را بنویسید...',
    },
    en: {
      spTagline:'AI Business Growth Advisor',
      authTitle:'Welcome', authSub:'Sign up to access your AI business growth advisor',
      tabSignup:'Sign Up', tabLogin:'Log In',
      nameLabel:'Full Name', emailLabel:'Email', passLabel:'Password',
      authBtn: authMode==='signup' ? 'Sign Up Free':'Log In',
      googleBtnText:'Continue with Google', authDivider:'or',
      navAdvisorLabel:'Advisor', navPlanLabel:'Plan', navDashLabel:'Dashboard',
      saveText:'Saved', placeholder:'Type your message...',
    }
  }[l];

  Object.entries(t).forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (el) el.textContent = val;
  });
  const inp = document.getElementById('msgInput');
  if (inp) inp.placeholder = t.placeholder;

  updateChips();
}

function updateChips() {
  STEP_LABELS[lang].forEach((label, i) => {
    const el = document.getElementById(`chip${i}l`);
    if (el) el.textContent = label;
  });
}

// ════════════════════════════════════
//  AUTH
// ════════════════════════════════════
function switchTab(mode) {
  authMode = mode;
  document.getElementById('tabSignup').classList.toggle('on', mode==='signup');
  document.getElementById('tabLogin').classList.toggle('on', mode==='login');
  document.getElementById('nameField').style.display = mode==='signup' ? '' : 'none';
  document.getElementById('authBtn').textContent = mode==='signup'
    ? (lang==='fa'?'ثبت‌نام رایگان':'Sign Up Free')
    : (lang==='fa'?'ورود':'Log In');
}

function handleAuth() {
  const name = document.getElementById('nameInput').value.trim() || 'کاربر';
  const email = document.getElementById('emailInput').value.trim() || 'user@example.com';
  userData = { name, email };
  document.getElementById('userAvatar').textContent = name.charAt(0) || 'U';

  document.getElementById('authScreen').classList.remove('show');
  document.getElementById('mainApp').classList.add('show');
  showView('advisor');
  updateChips();
  startChat();
}

// ════════════════════════════════════
//  VIEWS
// ════════════════════════════════════
function showView(v) {
  currentView = v;
  document.getElementById('advisorView').classList.toggle('active', v==='advisor');
  document.getElementById('planView').classList.toggle('active', v==='plan');
  document.getElementById('dashView').classList.toggle('active', v==='dash');

  document.getElementById('navAdvisor').classList.toggle('on', v==='advisor');
  document.getElementById('navPlan').classList.toggle('on', v==='plan');
  document.getElementById('navDash').classList.toggle('on', v==='dash');

  if (v==='plan') renderPlanView();
  if (v==='dash') renderDashView();
}

// ════════════════════════════════════
//  CHAT UI
// ════════════════════════════════════
function scrollDown() {
  const box = document.getElementById('chatBox');
  box.scrollTop = box.scrollHeight;
}

function addMsg(role, html) {
  const box = document.getElementById('chatBox');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const av = document.createElement('div');
  av.className = `msg-av ${role==='ai'?'ai-av':'user-av'}`;
  av.textContent = role==='ai' ? '🌱' : userData.name?.charAt(0)||'U';

  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = html;

  wrap.appendChild(av);
  wrap.appendChild(bub);
  box.appendChild(wrap);
  scrollDown();
  return bub;
}

function addDivider(step) {
  const labels = {
    fa:['تحلیل محیط کسب‌وکار','استراتژی‌ها و اهداف','جذب مشتری','وفادارسازی مشتریان','آنالیز و بهبود مستمر'],
    en:['Business Environment Analysis','Strategy & Goals','Customer Acquisition','Customer Loyalty','Analytics & Improvement']
  };
  const box = document.getElementById('chatBox');
  const d = document.createElement('div');
  d.className = 'chat-divider';
  d.textContent = `${lang==='fa'?'مرحله':'Step'} ${step} — ${labels[lang][step-1]}`;
  box.appendChild(d);
}

function showTyping() {
  const box = document.getElementById('chatBox');
  const wrap = document.createElement('div');
  wrap.className = 'msg ai'; wrap.id = 'typing';
  const av = document.createElement('div');
  av.className = 'msg-av ai-av'; av.textContent = '🌱';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = '<div class="typing-wrap"><span></span><span></span><span></span></div>';
  wrap.appendChild(av); wrap.appendChild(bub);
  box.appendChild(wrap); scrollDown();
}
function hideTyping() { document.getElementById('typing')?.remove(); }

function addQR(opts) {
  const box = document.getElementById('chatBox');
  const w = document.createElement('div');
  w.className = 'qr-wrap'; w.id = 'qr-wrap';
  opts.forEach(o => {
    const b = document.createElement('button');
    b.className = 'qr'; b.textContent = o;
    b.onclick = () => { document.getElementById('qr-wrap')?.remove(); send(o); };
    w.appendChild(b);
  });
  box.appendChild(w); scrollDown();
}
function removeQR() { document.getElementById('qr-wrap')?.remove(); }

function fmt(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
}

// ════════════════════════════════════
//  SMART QUICK REPLIES
// ════════════════════════════════════
function smartQR(reply) {
  const r = reply.toLowerCase();
  if (r.includes('b2b') && r.includes('b2c'))
    return lang==='fa'
      ? ['B2C (مستقیم به مشتری)','B2B (کسب‌وکار به کسب‌وکار)','هر دو']
      : ['B2C — Direct to Consumer','B2B — Business to Business','Both'];
  if ((r.includes('روند') && r.includes('بازار'))||r.includes('market trend')||r.includes('growing')||r.includes('declining'))
    return lang==='fa'
      ? ['در حال رشد 📈','پایدار ➡️','در حال کاهش 📉']
      : ['Growing 📈','Stable ➡️','Declining 📉'];
  if (r.includes('استراتژی رقابتی')||r.includes('competitive strategy'))
    return lang==='fa'
      ? ['رهبری هزینه 💰','تمایز 🎯','تمرکز بر بازار خاص 🔍']
      : ['Cost Leadership 💰','Differentiation 🎯','Niche Focus 🔍'];
  if (r.includes('توسعه کسب')||r.includes('development strategy'))
    return lang==='fa'
      ? ['توسعه محصول','توسعه بازار','نفوذ در بازار','تنوع‌بخشی']
      : ['Product Development','Market Development','Market Penetration','Diversification'];
  if (r.includes('بودجه')||r.includes('budget'))
    return lang==='fa'
      ? ['زیر ۵ میلیون/ماه','۵ تا ۲۰ میلیون/ماه','بالای ۲۰ میلیون/ماه']
      : ['Under $500/mo','$500–$2,000/mo','Over $2,000/mo'];
  if (r.includes('سطح‌بندی')||r.includes('tier'))
    return lang==='fa'
      ? ['۲ سطح (برنز/طلا)','۳ سطح (برنز/نقره/طلا)','۴ سطح (+VIP)']
      : ['2 Tiers (Bronze/Gold)','3 Tiers (Bronze/Silver/Gold)','4 Tiers (+VIP)'];
  if (r.includes('دوره بررسی')||r.includes('review frequency')||r.includes('هفتگی')||r.includes('weekly'))
    return lang==='fa'
      ? ['هفتگی','دو هفته یک‌بار','ماهانه']
      : ['Weekly','Bi-weekly','Monthly'];
  if (r.includes('درسته')||r.includes('correct')||r.includes('confirm'))
    return lang==='fa'
      ? ['بله، کامله ✓','یه چیزی اضافه کنم']
      : ['Yes, that\'s correct ✓','Let me add something'];
  return [];
}

// ════════════════════════════════════
//  STEP PROGRESS
// ════════════════════════════════════
function advanceStep(n) {
  if (n <= currentStep) return;
  currentStep = n;
  const pct = (n/5)*100;
  document.getElementById('progFill').style.width = pct+'%';
  for(let i=0;i<5;i++){
    const c = document.getElementById(`chip${i}`);
    c.classList.remove('active','done');
    if(i===n) c.classList.add('active');
    else if(i<n) c.classList.add('done');
  }
  if(n<5) setTimeout(()=>addDivider(n+1),400);
}

// ════════════════════════════════════
//  AUTO-SAVE
// ════════════════════════════════════
function autoSave(key, val) {
  savedData[key] = val;
  try { localStorage.setItem('growfinity_data', JSON.stringify(savedData)); } catch(e){}
  const ind = document.getElementById('saveIndicator');
  ind.classList.add('show');
  setTimeout(()=>ind.classList.remove('show'), 2000);
}

function loadSaved() {
  try {
    const d = localStorage.getItem('growfinity_data');
    if(d) savedData = JSON.parse(d);
  } catch(e){}
}

// ════════════════════════════════════
//  API
// ════════════════════════════════════
async function callAI(msg) {
  history.push({ role:'user', content:msg });
  const res = await fetch('/api/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1200,
      system: SYS,
      messages: history
    })
  });
  const data = await res.json();
  const raw = data.content?.[0]?.text || '';
  history.push({ role:'assistant', content:raw });
  return raw;
}

// ════════════════════════════════════
//  SEND MESSAGE
// ════════════════════════════════════
async function send(override) {
  const input = document.getElementById('msgInput');
  const msg = (override || input.value).trim();
  if(!msg || isBusy) return;

  removeQR();
  input.value=''; resize(input);
  document.getElementById('sendBtn').disabled = true;
  isBusy = true;

  addMsg('user', escHtml(msg));
  autoSave(`msg_${Date.now()}`, msg);

  showTyping();

  try {
    const raw = await callAI(msg);
    hideTyping();

    // Extract signals
    const stepMatch = raw.match(/\[STEP_COMPLETE:(\d+)\]/);
    const planMatch = raw.match(/\[PLAN\]([\s\S]*?)\[\/PLAN\]/);
    const summaryMatch = raw.match(/\[SUMMARY\]([\s\S]*?)\[\/SUMMARY\]/);

    // Clean display
    let display = raw
      .replace(/\[STEP_COMPLETE:\d+\]/g,'')
      .replace(/\[PLAN\][\s\S]*?\[\/PLAN\]/g,'')
      .replace(/\[SUMMARY\][\s\S]*?\[\/SUMMARY\]/g,'')
      .trim();

    addMsg('ai', fmt(display));

    if(summaryMatch) {
      try {
        const sd = JSON.parse(summaryMatch[1].trim());
        planData = { summary: sd };
        autoSave('planSummary', sd);
      } catch(e){}
    }

    if(planMatch) {
      planData = planData || {};
      planData.weeks = planMatch[1];
      autoSave('planWeeks', planMatch[1]);
      setTimeout(()=>renderPlanPreview(planMatch[1]), 500);
    }

    if(stepMatch) {
      const n = parseInt(stepMatch[1]);
      setTimeout(()=>advanceStep(n), 400);
      autoSave('step', n);
    }

    const qrs = smartQR(raw);
    if(qrs.length) setTimeout(()=>addQR(qrs), 300);

  } catch(err) {
    hideTyping();
    addMsg('ai', lang==='fa'?'⚠️ خطا در اتصال. لطفاً دوباره تلاش کنید.':'⚠️ Connection error. Please try again.');
  }

  isBusy = false;
  document.getElementById('sendBtn').disabled = false;
  scrollDown();
}

function renderPlanPreview(planText) {
  const box = document.getElementById('chatBox');
  const note = document.createElement('div');
  note.style.cssText = 'padding:4px 0 0 42px; animation:msgIn .4s ease both;';
  note.innerHTML = `
    <div style="background:var(--green-dim);border:1.5px solid var(--green);border-radius:12px;padding:14px 16px;max-width:400px;">
      <div style="font-size:.8rem;font-weight:700;color:var(--green);margin-bottom:6px;">✅ ${lang==='fa'?'برنامه اجرایی آماده شد!':'Action Plan Ready!'}</div>
      <div style="font-size:.8rem;color:var(--text2);margin-bottom:10px;">${lang==='fa'?'پلن ۱ ماهه شما آماده‌ست. برای مشاهده کامل کلیک کنید.':'Your 1-month plan is ready. Click to view.'}</div>
      <button onclick="showView('plan')" style="padding:7px 16px;border-radius:20px;background:var(--green);border:none;color:#fff;font-family:Vazirmatn,sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;">${lang==='fa'?'مشاهده پلن ←':'View Plan →'}</button>

// ════════════════════════════════════
//  PLAN VIEW RENDER
// ════════════════════════════════════
function renderPlanView() {
  const c = document.getElementById('planContent');
  if(!planData?.weeks) {
    c.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">${lang==='fa'?'پلن شما آماده نشده':'Your plan isn\'t ready yet'}</div>
        <div class="empty-sub">${lang==='fa'?'ابتدا مشاور را کامل کنید تا برنامه اجرایی ایجاد شود.':'Complete the AI advisor session first to generate your action plan.'}</div>
        <button class="empty-btn" onclick="showView('advisor')">${lang==='fa'?'برو به مشاور ←':'Go to Advisor →'}</button>
      </div>`;
    return;
  }

  const s = planData.summary || {};
  const tagMap = {
    marketing:{fa:'مارکتینگ',en:'Marketing',cls:'t-m'},
    sales:{fa:'فروش',en:'Sales',cls:'t-s'},
    loyalty:{fa:'وفادارسازی',en:'Loyalty',cls:'t-l'},
    analytics:{fa:'آنالیز',en:'Analytics',cls:'t-a'}
  };
  const weekLabels = {
    fa:['هفته اول — پایه‌گذاری','هفته دوم — اجرا','هفته سوم — بهینه‌سازی','هفته چهارم — آنالیز و رشد'],
    en:['Week 1 — Foundation','Week 2 — Execution','Week 3 — Optimization','Week 4 — Analysis & Growth']
  };

  const weeks = planData.weeks.match(/\[WEEK(\d+)\]([\s\S]*?)(?=\[WEEK|\[\/PLAN\]|$)/g)||[];
  let weeksHTML = weeks.map((w,wi)=>{
    const lines = w.split('\n').filter(l=>l.trim().startsWith('-'));
    const tasks = lines.map(l=>{
      const clean = l.replace(/^-\s*/,'').trim();
      const parts = clean.split('|');
      const text = parts[0].trim();
      const tagKey = (parts[1]||'').replace('tag:','').trim();
      const tag = tagMap[tagKey]||tagMap.marketing;
      return `<div class="plan-task"><div class="pt-dot"></div><div style="flex:1">${text}</div><span class="pt-tag ${tag.cls}">${tag[lang]}</span></div>`;
    }).join('');
    return `<div style="margin-bottom:12px;"><div class="plan-card"><div class="plan-week-head">📅 ${weekLabels[lang][wi]||''}</div>${tasks}</div></div>`;
  }).join('');

  const summaryItems = [
    {label:lang==='fa'?'نوع بازار':'Market Type', val:s.targetMarket||'—'},
    {label:lang==='fa'?'استراتژی':'Strategy', val:s.strategy||'—'},
    {label:lang==='fa'?'کانال‌های اصلی':'Top Channels', val:(s.topChannels||[]).join('، ')},
    {label:'KPIs', val:(s.kpis||[]).join('، ')},
  ].map(i=>`<div class="summary-item"><div class="summary-label">${i.label}</div><div class="summary-val">${i.val}</div></div>`).join('');

  c.innerHTML = `
    <div class="plan-header">
      <div class="plan-header-tag">${lang==='fa'?'برنامه بازاریابی شخصی':'Personalized Marketing Plan'}</div>
      <div class="plan-header-title">${lang==='fa'?'برنامه اجرایی ۱ ماهه':'1-Month Action Plan'}</div>
      <div class="plan-header-sub">${s.businessDesc||''}</div>
    </div>
    <div class="plan-section">
      <div class="plan-section-title">${lang==='fa'?'خلاصه استراتژی':'Strategy Summary'}</div>
      <div class="summary-grid">${summaryItems}</div>
    </div>
    <div class="plan-section">
      <div class="plan-section-title">${lang==='fa'?'برنامه هفته‌به‌هفته':'Week by Week Plan'}</div>
      ${weeksHTML}
    </div>
    <button class="dl-btn" onclick="showToast('${lang==='fa'?'قابلیت دانلود PDF به زودی اضافه می‌شود':'PDF download coming soon!'}')">
      📄 ${lang==='fa'?'دانلود PDF':'Download PDF'}
    </button>`;
}

// ════════════════════════════════════
//  UTILS
// ════════════════════════════════════
function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function onKey(e) {
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
}
function resize(el) {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}
